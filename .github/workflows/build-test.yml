name: Build and perform build time tests

on:
  pull_request:        # always build for PRs but don't publish
  workflow_dispatch:   # allow manual runs

# The full cross-OS, cross-arch test and static-analysis matrix runs nightly
# from .github/workflows/nightly.yml. On PRs we run a reduced matrix:
#   - all OS images built for amd64 (devcontainer also for arm64)
#   - tests on all OS images amd64; arm64 only on devcontainer
#   - static analysis only on devcontainer

env:
  DEV_IMAGE_TAG_PREFIX: repository.mdh.quantum.com:5004/cache/chimera-dev
  U26_IMAGE_TAG_PREFIX: repository.mdh.quantum.com:5004/cache/chimera-ubuntu26
  U24_IMAGE_TAG_PREFIX: repository.mdh.quantum.com:5004/cache/chimera-ubuntu24
  U22_IMAGE_TAG_PREFIX: repository.mdh.quantum.com:5004/cache/chimera-ubuntu22
  R9_IMAGE_TAG_PREFIX: repository.mdh.quantum.com:5004/cache/chimera-rocky9
  R10_IMAGE_TAG_PREFIX: repository.mdh.quantum.com:5004/cache/chimera-rocky10
  # Internal pull-through cache for the prebuilt KVM guest images (mirrors
  # ghcr.io/chimera-nas/kvm-test-base). Public default lives in CMake.
  KVM_IMAGE_REGISTRY: repository.mdh.quantum.com:5009/chimera-nas/kvm-test-base
  APT_MIRROR: http://repository.mdh.quantum.com/repository/pkgs/ubuntu
  DOCKER_MIRROR: repository.mdh.quantum.com/

jobs:
  build-devcontainer:
    name: Build devcontainer ${{ matrix.platform }}
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: arc-amd64
            arch: amd64
          - platform: linux/arm64
            runner: arc-arm64
            arch: arm64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          driver: docker-container
          buildkitd-config-inline: |
            [registry."docker.io"]
              mirrors = ["repository.mdh.quantum.com:5001"]

      - name: Build and push the dev container image
        uses: docker/build-push-action@v7
        with:
          context: .devcontainer
          file: .devcontainer/Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          tags: ${{ env.DEV_IMAGE_TAG_PREFIX }}:${{ github.sha }}-${{ matrix.arch }}
          cache-from: type=registry,ref=repository.mdh.quantum.com:5004/cache/chimera-dev:${{ matrix.arch }}
          cache-to: type=registry,ref=repository.mdh.quantum.com:5004/cache/chimera-dev:${{ matrix.arch }},mode=max
          build-args: |
            APT_MIRROR=${{ env.APT_MIRROR }}
            DOCKER_MIRROR=${{ env.DOCKER_MIRROR }}

  build-ubuntu26:
    name: Build ubuntu26 ${{ matrix.platform }}
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: arc-amd64
            arch: amd64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          driver: docker-container
          buildkitd-config-inline: |
            [registry."docker.io"]
              mirrors = ["repository.mdh.quantum.com:5001"]

      - name: Build and push the ubuntu26 CI image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.ubuntu26.04
          platforms: ${{ matrix.platform }}
          push: true
          tags: ${{ env.U26_IMAGE_TAG_PREFIX }}:${{ github.sha }}-${{ matrix.arch }}
          cache-from: type=registry,ref=repository.mdh.quantum.com:5004/cache/chimera-ubuntu26:${{ matrix.arch }}
          cache-to: type=registry,ref=repository.mdh.quantum.com:5004/cache/chimera-ubuntu26:${{ matrix.arch }},mode=max
          build-args: |
            APT_MIRROR=${{ env.APT_MIRROR }}
            DOCKER_MIRROR=${{ env.DOCKER_MIRROR }}

  build-ubuntu24:
    name: Build ubuntu24 ${{ matrix.platform }}
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: arc-amd64
            arch: amd64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          driver: docker-container
          buildkitd-config-inline: |
            [registry."docker.io"]
              mirrors = ["repository.mdh.quantum.com:5001"]

      - name: Build and push the ubuntu24 CI image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.ubuntu24.04
          platforms: ${{ matrix.platform }}
          push: true
          tags: ${{ env.U24_IMAGE_TAG_PREFIX }}:${{ github.sha }}-${{ matrix.arch }}
          cache-from: type=registry,ref=repository.mdh.quantum.com:5004/cache/chimera-ubuntu24:${{ matrix.arch }}
          cache-to: type=registry,ref=repository.mdh.quantum.com:5004/cache/chimera-ubuntu24:${{ matrix.arch }},mode=max
          build-args: |
            APT_MIRROR=${{ env.APT_MIRROR }}
            DOCKER_MIRROR=${{ env.DOCKER_MIRROR }}

  build-ubuntu22:
    name: Build ubuntu22 ${{ matrix.platform }}
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: arc-amd64
            arch: amd64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          driver: docker-container
          buildkitd-config-inline: |
            [registry."docker.io"]
              mirrors = ["repository.mdh.quantum.com:5001"]

      - name: Build and push the ubuntu22 CI image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.ubuntu22.04
          platforms: ${{ matrix.platform }}
          push: true
          tags: ${{ env.U22_IMAGE_TAG_PREFIX }}:${{ github.sha }}-${{ matrix.arch }}
          cache-from: type=registry,ref=repository.mdh.quantum.com:5004/cache/chimera-ubuntu22:${{ matrix.arch }}
          cache-to: type=registry,ref=repository.mdh.quantum.com:5004/cache/chimera-ubuntu22:${{ matrix.arch }},mode=max
          build-args: |
            APT_MIRROR=${{ env.APT_MIRROR }}
            DOCKER_MIRROR=${{ env.DOCKER_MIRROR }}

  build-rocky9:
    name: Build rocky9 ${{ matrix.platform }}
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: arc-amd64
            arch: amd64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          driver: docker-container
          buildkitd-config-inline: |
            [registry."docker.io"]
              mirrors = ["repository.mdh.quantum.com:5001"]

      - name: Build and push the rocky9 CI image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.rocky9
          platforms: ${{ matrix.platform }}
          push: true
          tags: ${{ env.R9_IMAGE_TAG_PREFIX }}:${{ github.sha }}-${{ matrix.arch }}
          cache-from: type=registry,ref=repository.mdh.quantum.com:5004/cache/chimera-rocky9:${{ matrix.arch }}
          cache-to: type=registry,ref=repository.mdh.quantum.com:5004/cache/chimera-rocky9:${{ matrix.arch }},mode=max
          build-args: |
            DOCKER_MIRROR=${{ env.DOCKER_MIRROR }}

  build-rocky10:
    name: Build rocky10 ${{ matrix.platform }}
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: arc-amd64
            arch: amd64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          driver: docker-container
          buildkitd-config-inline: |
            [registry."docker.io"]
              mirrors = ["repository.mdh.quantum.com:5001"]

      - name: Build and push the rocky10 CI image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.rocky10
          platforms: ${{ matrix.platform }}
          push: true
          tags: ${{ env.R10_IMAGE_TAG_PREFIX }}:${{ github.sha }}-${{ matrix.arch }}
          cache-from: type=registry,ref=repository.mdh.quantum.com:5004/cache/chimera-rocky10:${{ matrix.arch }}
          cache-to: type=registry,ref=repository.mdh.quantum.com:5004/cache/chimera-rocky10:${{ matrix.arch }},mode=max
          build-args: |
            DOCKER_MIRROR=${{ env.DOCKER_MIRROR }}

  test:
    name: Test ${{ matrix.image_name }} ${{ matrix.platform }} ${{ matrix.build_type }}
    needs: [build-devcontainer, build-ubuntu26, build-ubuntu24, build-ubuntu22, build-rocky9, build-rocky10]
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          # devcontainer (amd64 + arm64)
          - platform: linux/amd64
            runner: arc-amd64
            arch: amd64
            build_type: Release
            image_tag_prefix: repository.mdh.quantum.com:5004/cache/chimera-dev
            image_name: devcontainer
            cmake_extra: ""
          - platform: linux/amd64
            runner: arc-amd64
            arch: amd64
            build_type: Debug
            image_tag_prefix: repository.mdh.quantum.com:5004/cache/chimera-dev
            image_name: devcontainer
            cmake_extra: ""
          - platform: linux/arm64
            runner: arc-arm64
            arch: arm64
            build_type: Release
            image_tag_prefix: repository.mdh.quantum.com:5004/cache/chimera-dev
            image_name: devcontainer
            cmake_extra: ""
          - platform: linux/arm64
            runner: arc-arm64
            arch: arm64
            build_type: Debug
            image_tag_prefix: repository.mdh.quantum.com:5004/cache/chimera-dev
            image_name: devcontainer
            cmake_extra: ""
          # ubuntu 26 (amd64 only on PR; arm64 runs in nightly)
          - platform: linux/amd64
            runner: arc-amd64
            arch: amd64
            build_type: Release
            image_tag_prefix: repository.mdh.quantum.com:5004/cache/chimera-ubuntu26
            image_name: ubuntu26
            cmake_extra: ""
          - platform: linux/amd64
            runner: arc-amd64
            arch: amd64
            build_type: Debug
            image_tag_prefix: repository.mdh.quantum.com:5004/cache/chimera-ubuntu26
            image_name: ubuntu26
            cmake_extra: ""
          # ubuntu 24 (amd64 only on PR; arm64 runs in nightly)
          - platform: linux/amd64
            runner: arc-amd64
            arch: amd64
            build_type: Release
            image_tag_prefix: repository.mdh.quantum.com:5004/cache/chimera-ubuntu24
            image_name: ubuntu24
            cmake_extra: ""
          - platform: linux/amd64
            runner: arc-amd64
            arch: amd64
            build_type: Debug
            image_tag_prefix: repository.mdh.quantum.com:5004/cache/chimera-ubuntu24
            image_name: ubuntu24
            cmake_extra: ""
          # ubuntu 22 (amd64 only on PR; arm64 runs in nightly)
          - platform: linux/amd64
            runner: arc-amd64
            arch: amd64
            build_type: Release
            image_tag_prefix: repository.mdh.quantum.com:5004/cache/chimera-ubuntu22
            image_name: ubuntu22
            cmake_extra: "-DIO_URING_ENABLED=OFF"
          - platform: linux/amd64
            runner: arc-amd64
            arch: amd64
            build_type: Debug
            image_tag_prefix: repository.mdh.quantum.com:5004/cache/chimera-ubuntu22
            image_name: ubuntu22
            cmake_extra: "-DIO_URING_ENABLED=OFF"
          # rocky 9 (io_uring disabled: kernel 5.14 + ASAN causes timeouts, see #197)
          - platform: linux/amd64
            runner: arc-amd64
            arch: amd64
            build_type: Release
            image_tag_prefix: repository.mdh.quantum.com:5004/cache/chimera-rocky9
            image_name: rocky9
            cmake_extra: "-DIO_URING_ENABLED=OFF"
          - platform: linux/amd64
            runner: arc-amd64
            arch: amd64
            build_type: Debug
            image_tag_prefix: repository.mdh.quantum.com:5004/cache/chimera-rocky9
            image_name: rocky9
            cmake_extra: "-DIO_URING_ENABLED=OFF"
          # rocky 10 (amd64 only on PR; arm64 runs in nightly)
          - platform: linux/amd64
            runner: arc-amd64
            arch: amd64
            build_type: Release
            image_tag_prefix: repository.mdh.quantum.com:5004/cache/chimera-rocky10
            image_name: rocky10
            cmake_extra: ""
          - platform: linux/amd64
            runner: arc-amd64
            arch: amd64
            build_type: Debug
            image_tag_prefix: repository.mdh.quantum.com:5004/cache/chimera-rocky10
            image_name: rocky10
            cmake_extra: ""

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          submodules: recursive

      # KVM guest images are now pulled from GHCR (chimera-nas/kvm-test-base)
      # with oras during the build, instead of being built via inner dind.
      # Fetch the static oras binary on the runner and mount it into the
      # build container.
      - name: Fetch oras CLI
        run: |
          ORAS_VERSION=1.2.0
          curl -sSL "https://github.com/oras-project/oras/releases/download/v${ORAS_VERSION}/oras_${ORAS_VERSION}_linux_${{ matrix.arch }}.tar.gz" \
            | tar -xz -C "${{ github.workspace }}" oras
          chmod +x "${{ github.workspace }}/oras"

      - name: Configure, build, and test inside the container
        run: |
          docker run --rm --privileged \
            -e DOCKER_MIRROR=${{ env.DOCKER_MIRROR }} \
            -e APT_MIRROR=${{ env.APT_MIRROR }} \
            -v "${{ github.workspace }}:/workspace" \
            -v "${{ github.workspace }}/oras:/usr/local/bin/oras:ro" \
            -v /build \
            -w /build \
            ${{ matrix.image_tag_prefix }}:${{ github.sha }}-${{ matrix.arch }} \
            bash -euxc '\
              cmake -G Ninja -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} -DREQUIRE_NETNS_TESTS=ON -DKVM_IMAGE_REGISTRY=${{ env.KVM_IMAGE_REGISTRY }} ${{ matrix.cmake_extra }} /workspace && \
              ninja && \
              mkdir -p /workspace/ctest-results && \
              /workspace/scripts/cap_ctest_output.sh \
              ctest --output-on-failure --test-output-size-failed 65536 --timeout 300 -j 32 \
                --output-junit /workspace/ctest-results/results.xml'

      # Per-test pass/fail (one <testcase> per CTest test, with captured output
      # embedded) -- uploaded as an artifact and aggregated into a PR check by
      # the publish-test-results job.  if: always() so results publish even when
      # the test step failed (which is exactly when they are most useful).
      - name: Upload ctest JUnit results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: ctest-junit-${{ matrix.image_name }}-${{ matrix.arch }}-${{ matrix.build_type }}
          path: ctest-results/results.xml
          if-no-files-found: warn
          retention-days: 30

  static-analysis:
    name: Static Analysis ${{ matrix.image_name }} ${{ matrix.platform }} ${{ matrix.build_type }}
    needs: [build-devcontainer]
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          # devcontainer only on PR; full matrix runs in nightly
          - platform: linux/amd64
            runner: arc-amd64
            arch: amd64
            build_type: Release
            image_tag_prefix: repository.mdh.quantum.com:5004/cache/chimera-dev
            image_name: devcontainer
            cmake_extra: ""
          - platform: linux/amd64
            runner: arc-amd64
            arch: amd64
            build_type: Debug
            image_tag_prefix: repository.mdh.quantum.com:5004/cache/chimera-dev
            image_name: devcontainer
            cmake_extra: ""
          - platform: linux/arm64
            runner: arc-arm64
            arch: arm64
            build_type: Release
            image_tag_prefix: repository.mdh.quantum.com:5004/cache/chimera-dev
            image_name: devcontainer
            cmake_extra: ""
          - platform: linux/arm64
            runner: arc-arm64
            arch: arm64
            build_type: Debug
            image_tag_prefix: repository.mdh.quantum.com:5004/cache/chimera-dev
            image_name: devcontainer
            cmake_extra: ""

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Perform clang static analysis
        id: static-analysis
        run: |
          set -o pipefail
          mkdir -p "${{ github.workspace }}/scan-report"
          docker run --rm --privileged \
            -e DOCKER_MIRROR=${{ env.DOCKER_MIRROR }} \
            -e APT_MIRROR=${{ env.APT_MIRROR }} \
            -v "${{ github.workspace }}:/workspace" \
            -v "${{ github.workspace }}/scan-report:/scan-report" \
            -v /build \
            -w /build \
            ${{ matrix.image_tag_prefix }}:${{ github.sha }}-${{ matrix.arch }} \
            bash -euxc '\
              scan-build --status-bugs -o /scan-report \
              sh -c "cmake -D CMAKE_BUILD_TYPE=${{ matrix.build_type }} -D IO_URING_NVME_ENABLED=OFF ${{ matrix.cmake_extra }} -B /build -S /workspace -G Ninja && ninja -C /build"' \
            2>&1 | tee "${{ github.workspace }}/scan-report/scan-build-output.txt"

      - name: Upload static analysis report
        if: ${{ failure() && steps.static-analysis.outcome == 'failure' }}
        uses: actions/upload-artifact@v6
        with:
          name: scan-report-${{ matrix.image_name }}-${{ matrix.arch }}-${{ matrix.build_type }}
          path: scan-report/
          if-no-files-found: warn
          retention-days: 30

  # Aggregate the per-job ctest JUnit artifacts into a single GitHub check so a
  # PR shows which individual tests passed/failed without digging through the
  # ~12k-line log of each matrix job.  Runs after the whole test matrix (always,
  # so a failing run still gets a report) and never fails the build itself --
  # the test jobs remain the source of truth for pass/fail; this is visibility.
  publish-test-results:
    name: Publish test results
    needs: [test]
    if: always()
    runs-on: arc-amd64
    permissions:
      checks: write
      pull-requests: write
      contents: read
    steps:
      - name: Download ctest JUnit artifacts
        uses: actions/download-artifact@v6
        with:
          pattern: ctest-junit-*
          path: junit

      - name: Publish test results to a PR check
        uses: EnricoMi/publish-unit-test-result-action@v2
        continue-on-error: true
        with:
          files: "junit/**/*.xml"
          check_name: "CTest results"
          comment_mode: always
          action_fail: false
          ignore_runs: false
